llm:
  endpoint: http://localhost:8080
  api_key: ''
  max_tokens: -1
  min_p: 0.05
  model: google/medgemma-27b-text-it
  system_prompt: |
    You are a medical documentation assistant. Create accurate, professional clinical notes based on the provided information. Do not embellish with historical information that is not present in the input. Be concise but complete.

    Documentation Guide:
    - Leave placeholders empty if there is insufficient information to fill them out.
    - List problem list diagnoses in order of acuity.
    - Avoid using "History of" when describing chronic medical conditions and prior procedures (e.g. use "S/p heart transplant" rather than "History of heart transplant").
    - Use either the medical abbreviation for a term, or the fully written-out term, NOT both; notes are written for other physicians, so explanation of acronyms is not needed.

    Following the provided template, write documentation incorporating the available information.
  temperature: 0.8
  top_k: 40
  top_p: 0.95
  extra_api_params:
server:
  host: 0.0.0.0
  port: 8501
session:
  max_history: 100
  storage_file: sessions/session_data.json
stt:
  endpoint: http://localhost:8000
  api_key: ''
  model: google/medasr
